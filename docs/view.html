<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sturij Marketing — Docs</title>
<style>
  :root{--bg:#181410;--card:#211c17;--line:rgba(240,237,230,.10);--ink:#f0ede6;--body:#c9c4ba;--muted:#8b8578;--bronze:#d4aa58;--info:#7fb0c0}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--body);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6}
  .top{position:sticky;top:0;background:rgba(24,20,16,.94);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);padding:12px 20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .top a{color:var(--muted);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:999px}
  .top a.on{color:var(--bronze);border-color:rgba(212,170,88,.5)}
  .top a:hover{color:var(--ink)}
  .wrap{max-width:820px;margin:0 auto;padding:34px 22px 90px}
  h1{font-family:Georgia,'Times New Roman',serif;font-size:34px;color:var(--ink);margin:0 0 6px;line-height:1.15}
  h2{font-family:Georgia,serif;font-size:24px;color:var(--ink);margin:34px 0 10px;padding-top:14px;border-top:1px solid var(--line)}
  h3{font-size:18px;color:var(--ink);margin:22px 0 8px}
  h4{font-size:15px;color:var(--ink);margin:18px 0 6px}
  p{margin:10px 0}
  a{color:var(--info)}
  code{background:rgba(240,237,230,.08);padding:2px 6px;border-radius:5px;font-family:'SFMono-Regular',Consolas,monospace;font-size:.88em;color:var(--ink)}
  pre{background:#0e0b08;border:1px solid var(--line);border-radius:10px;padding:14px;overflow:auto}
  pre code{background:none;padding:0}
  ul,ol{margin:10px 0;padding-left:24px}
  li{margin:5px 0}
  blockquote{margin:14px 0;padding:10px 16px;border-left:3px solid var(--bronze);background:rgba(212,170,88,.06);border-radius:0 8px 8px 0;color:var(--ink)}
  hr{border:none;border-top:1px solid var(--line);margin:26px 0}
  strong{color:var(--ink)}
  .tw{overflow-x:auto;margin:14px 0}
  table{border-collapse:collapse;width:100%;font-size:14px}
  th,td{border:1px solid var(--line);padding:8px 11px;text-align:left;vertical-align:top}
  th{background:rgba(240,237,230,.05);color:var(--ink);font-weight:600}
  .meta{color:var(--muted);font-size:13px;margin:0 0 18px}
  .err{color:#e0a08a;padding:20px 0}
</style>
</head>
<body>
  <div class="top">
    <a href="view.html?doc=USER_HANDBOOK" id="lnHb">📖 User Handbook</a>
    <a href="view.html?doc=TECHNICAL_SPEC" id="lnTs">🛠 Technical Specification</a>
    <a href="../app.html" style="margin-left:auto">← Back to app</a>
  </div>
  <div class="wrap" id="doc"><p class="meta">Loading…</p></div>

<script>
(function(){
  var DOCS={ USER_HANDBOOK:'USER_HANDBOOK.md', TECHNICAL_SPEC:'TECHNICAL_SPEC.md' };
  var p=new URLSearchParams(location.search), key=p.get('doc')||'USER_HANDBOOK';
  if(!DOCS[key]) key='USER_HANDBOOK';
  document.getElementById(key==='USER_HANDBOOK'?'lnHb':'lnTs').classList.add('on');
  document.title='Sturij — '+(key==='USER_HANDBOOK'?'User Handbook':'Technical Specification');

  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function inline(s){
    s=esc(s);
    s=s.replace(/`([^`]+)`/g,function(_,c){return '<code>'+c+'</code>';});
    s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,function(_,t,u){return '<a href="'+u+'" target="_blank" rel="noopener">'+t+'</a>';});
    return s;
  }
  function stripFrontmatter(t){
    if(t.slice(0,3)==='---'){ var e=t.indexOf('\n---',3); if(e>=0){ var nl=t.indexOf('\n',e+1); return t.slice(nl+1); } }
    return t;
  }
  function render(md){
    var lines=stripFrontmatter(md).replace(/\r/g,'').split('\n');
    var out=[], i=0;
    function flushTable(){
      var rows=[];
      while(i<lines.length && /^\s*\|/.test(lines[i])){ rows.push(lines[i]); i++; }
      if(rows.length<2){ rows.forEach(function(r){ out.push('<p>'+inline(r)+'</p>'); }); return; }
      var cells=function(r){ return r.trim().replace(/^\||\|$/g,'').split('|').map(function(c){return c.trim();}); };
      var head=cells(rows[0]);
      var html='<div class="tw"><table><thead><tr>'+head.map(function(h){return '<th>'+inline(h)+'</th>';}).join('')+'</tr></thead><tbody>';
      for(var r=2;r<rows.length;r++){ var c=cells(rows[r]); html+='<tr>'+c.map(function(x){return '<td>'+inline(x)+'</td>';}).join('')+'</tr>'; }
      html+='</tbody></table></div>'; out.push(html);
    }
    while(i<lines.length){
      var ln=lines[i];
      if(/^\s*\|/.test(ln)){ flushTable(); continue; }
      if(/^```/.test(ln)){ i++; var buf=[]; while(i<lines.length && !/^```/.test(lines[i])){ buf.push(lines[i]); i++; } i++; out.push('<pre><code>'+esc(buf.join('\n'))+'</code></pre>'); continue; }
      var h=ln.match(/^(#{1,6})\s+(.*)$/);
      if(h){ var lvl=h[1].length; out.push('<h'+lvl+'>'+inline(h[2])+'</h'+lvl+'>'); i++; continue; }
      if(/^\s*>\s?/.test(ln)){ var q=[]; while(i<lines.length && /^\s*>\s?/.test(lines[i])){ q.push(lines[i].replace(/^\s*>\s?/,'')); i++; } out.push('<blockquote>'+inline(q.join(' '))+'</blockquote>'); continue; }
      if(/^\s*([-*])\s+/.test(ln)){ var items=[]; while(i<lines.length && /^\s*([-*])\s+/.test(lines[i])){ items.push('<li>'+inline(lines[i].replace(/^\s*([-*])\s+/,''))+'</li>'); i++; } out.push('<ul>'+items.join('')+'</ul>'); continue; }
      if(/^\s*\d+\.\s+/.test(ln)){ var oi=[]; while(i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){ oi.push('<li>'+inline(lines[i].replace(/^\s*\d+\.\s+/,''))+'</li>'); i++; } out.push('<ol>'+oi.join('')+'</ol>'); continue; }
      if(/^\s*(---|\*\*\*|___)\s*$/.test(ln)){ out.push('<hr>'); i++; continue; }
      if(/^\s*$/.test(ln)){ i++; continue; }
      var para=[ln]; i++;
      while(i<lines.length && !/^\s*$/.test(lines[i]) && !/^(#{1,6}\s|>\s|\s*[-*]\s|\s*\d+\.\s|```|\s*\|)/.test(lines[i])){ para.push(lines[i]); i++; }
      out.push('<p>'+inline(para.join(' '))+'</p>');
    }
    return out.join('\n');
  }

  fetch(DOCS[key],{cache:'no-cache'}).then(function(r){ if(!r.ok) throw new Error(r.status); return r.text(); })
    .then(function(md){ document.getElementById('doc').innerHTML=render(md); })
    .catch(function(){ document.getElementById('doc').innerHTML='<p class="err">Couldn’t load this document. It lives in the repo at <code>docs/'+DOCS[key]+'</code>.</p>'; });
})();
</script>
</body>
</html>
